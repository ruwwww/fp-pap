feature_configs:
  dl_only:
    add_calendar: false
    add_ratios: false
    description: "Raw time series \u2014 hanya exogenous vars, tanpa rekayasa feature\
      \ apapun"
    diffs: []
    ema_spans: []
    exog_lags: []
    raw_only: true
    rolling_stats: []
    rolling_windows: []
    target_lags: []
  full:
    add_calendar: true
    add_ratios: true
    description: "Full feature set \u2014 8 target lags, 4 rolling windows, EMA, diff,\
      \ calendar, ratios"
    diffs:
    - 1
    - 5
    - 20
    ema_spans:
    - 5
    - 20
    - 60
    exog_lags:
    - 1
    - 5
    raw_only: false
    rolling_stats:
