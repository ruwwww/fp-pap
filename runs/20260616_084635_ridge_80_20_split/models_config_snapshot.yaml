models:
  dl_models:
    bilstm:
      category: DL
      class: src.models.dl_models.BiLSTMModel
      enabled: false
      feature_config: dl_only
      parallel_safe: false
      params:
        batch_size: 32
        dropout: 0.2
        epochs: 100
        learning_rate: 0.001
        lookback: 30
        patience: 15
        units:
        - 128
        - 64
      search_space:
        dropout:
          high: 0.5
          low: 0.0
          type: float
        lookback:
          high: 60
          low: 7
          type: int
        unit_size:
          choices:
          - - 64
            - 32
          - - 128
            - 64
          - - 256
            - 128
          type: categorical
    cnn_lstm:
      category: DL
      class: src.models.dl_models.CNNLSTMModel
      enabled: true
      feature_config: dl_only
      parallel_safe: false
      params:
        batch_size: 32
        dropout: 0.2
        epochs: 100
        filters: 64
        kernel_size: 3
        learning_rate: 0.001
        lookback: 30
        lstm_units:
        - 64
        - 32
        patience: 15
      search_space:
        dropout:
          high: 0.5
          low: 0.0
          type: float
        filters:
          choices:
          - 32
          - 64
          - 128
          type: categorical
        kernel_size:
          choices:
          - 2
          - 3
          - 5
          type: categorical
        learning_rate:
          high: 0.01
          log: true
          low: 0.0001
          type: float
        lookback:
          high: 60
          low: 7
          type: int
    gru:
      category: DL
      class: src.models.dl_models.GRUModel
      enabled: true
      feature_config: dl_only
      parallel_safe: false
      params:
        batch_size: 32
        dropout: 0.2
        epochs: 100
        learning_rate: 0.001
        lookback: 30
        patience: 15
        units:
        - 128
        - 64
      search_space:
        dropout:
          high: 0.5
          low: 0.0
          type: float
        learning_rate:
          high: 0.01
          log: true
          low: 0.0001
          type: float
        lookback:
          high: 60
          low: 7
          type: int
        unit_size:
          choices:
          - - 64
            - 32
          - - 128
            - 64
          - - 256
            - 128
          type: categorical
    lstm:
      category: DL
      class: src.models.dl_models.LSTMModel
      enabled: true
      feature_config: dl_only
      parallel_safe: false
      params:
        batch_size: 32
        dropout: 0.2
        epochs: 100
        learning_rate: 0.001
        lookback: 30
        patience: 15
        units:
        - 128
        - 64
      search_space:
        batch_size:
          choices:
          - 16
          - 32
          - 64
          type: categorical
        dropout:
          high: 0.5
          low: 0.0
          type: float
        learning_rate:
          high: 0.01
          log: true
          low: 0.0001
          type: float
        lookback:
          high: 60
          low: 7
          type: int
        unit_size:
          choices:
          - - 64
            - 32
          - - 128
            - 64
          - - 256
            - 128
          - - 128
            - 64
            - 32
          type: categorical
    rnn:
      category: DL
      class: src.models.dl_models.RNNModel
      enabled: false
      feature_config: dl_only
      parallel_safe: false
      params:
        batch_size: 32
        dropout: 0.2
        epochs: 100
        learning_rate: 0.001
        lookback: 30
        patience: 15
        units:
        - 64
        - 32
      search_space:
        dropout:
          high: 0.5
          low: 0.0
          type: float
        unit_size:
          choices:
          - - 32
            - 16
          - - 64
            - 32
          - - 128
            - 64
          type: categorical
  ensemble_models:
    blending_rf_lstm:
      base_models:
      - random_forest
      - lstm
      category: Ensemble
      class: src.models.ensemble_models.BlendingEnsemble
      enabled: false
      feature_config: full
      meta_learner: ridge
      params:
        val_ratio: 0.2
    stacking_lgbm_gru:
      base_models:
      - lightgbm
      - gru
      category: Ensemble
      class: src.models.ensemble_models.StackingEnsemble
      enabled: true
      feature_config: full
      meta_learner: ridge
      params:
        cv_folds: 5
    voting_xgb_lstm:
      base_models:
      - xgboost
      - lstm
      category: Ensemble
      class: src.models.ensemble_models.VotingEnsemble
      enabled: true
      feature_config: full
      params:
        weights:
        - 0.5
        - 0.5
      search_space:
        weight_ml:
          high: 0.8
          low: 0.2
          type: float
  ml_models:
    catboost:
      category: ML
      class: src.models.ml_models.CatBoostModel
      enabled: false
      feature_config: reduced
      parallel_safe: true
      params:
        depth: 6
        iterations: 300
        learning_rate: 0.05
        random_seed: 42
        verbose: 0
      search_space:
        depth:
          high: 10
          low: 3
          type: int
        iterations:
          high: 600
          low: 100
          type: int
        learning_rate:
          high: 0.3
          log: true
          low: 0.005
          type: float
    gradient_boosting:
      category: ML
      class: src.models.ml_models.GradientBoostingModel
      enabled: true
      feature_config: reduced
      parallel_safe: true
      params:
        learning_rate: 0.05
        max_depth: 5
        min_samples_split: 5
        n_estimators: 200
        random_state: 42
        subsample: 0.8
      search_space:
        learning_rate:
          high: 0.3
          log: true
          low: 0.01
          type: float
        max_depth:
          high: 10
          low: 3
          type: int
        min_samples_split:
          high: 20
          low: 2
          type: int
        n_estimators:
          high: 500
          low: 100
          type: int
        subsample:
          high: 1.0
          low: 0.5
          type: float
    lightgbm:
      category: ML
      class: src.models.ml_models.LightGBMModel
      enabled: true
      feature_config: reduced
      parallel_safe: true
      params:
        colsample_bytree: 0.8
        learning_rate: 0.05
        max_depth: -1
        min_child_samples: 20
        n_estimators: 300
        n_jobs: 1
        num_leaves: 31
        random_state: 42
        reg_alpha: 0
        reg_lambda: 0
        subsample: 0.8
        verbose: -1
      search_space:
        colsample_bytree:
          high: 1.0
          low: 0.5
          type: float
        learning_rate:
          high: 0.3
          log: true
          low: 0.005
          type: float
        max_depth:
          high: 20
          low: -1
          type: int
        min_child_samples:
          high: 100
          low: 5
          type: int
        n_estimators:
          high: 800
          low: 100
          type: int
        num_leaves:
          high: 150
          low: 20
          type: int
        subsample:
          high: 1.0
          low: 0.5
          type: float
    random_forest:
      category: ML
      class: src.models.ml_models.RandomForestModel
      enabled: true
      feature_config: reduced
      parallel_safe: true
      params:
        max_depth: 10
        min_samples_split: 5
        n_estimators: 200
        n_jobs: -1
        random_state: 42
      search_space:
        max_depth:
          high: 20
          low: 3
          type: int
        min_samples_leaf:
          high: 10
          low: 1
          type: int
        min_samples_split:
          high: 20
          low: 2
          type: int
        n_estimators:
          high: 600
          low: 100
          type: int
    ridge:
      category: ML
      class: src.models.ml_models.RidgeModel
      enabled: true
      feature_config: ridge_full
      parallel_safe: true
      params:
        alpha: 1.0
      search_space:
        alpha:
          high: 1000.0
          log: true
          low: 0.001
          type: float
    svr:
      category: ML
      class: src.models.ml_models.SVRModel
      enabled: false
      feature_config: reduced
      parallel_safe: true
      params:
        C: 1.0
        epsilon: 0.1
        gamma: scale
        kernel: rbf
      search_space:
        C:
          high: 100.0
          log: true
          low: 0.01
          type: float
        epsilon:
          high: 1.0
          log: true
          low: 0.001
          type: float
        kernel:
          choices:
          - rbf
          - linear
          - poly
          type: categorical
    xgboost:
      category: ML
      class: src.models.ml_models.XGBoostModel
      enabled: true
      feature_config: reduced
      parallel_safe: true
      params:
        colsample_bytree: 0.8
        gamma: 0
        learning_rate: 0.05
        max_depth: 6
        min_child_weight: 1
        n_estimators: 300
        random_state: 42
        reg_alpha: 0
        reg_lambda: 1
        subsample: 0.8
      search_space:
        colsample_bytree:
          high: 1.0
          low: 0.5
          type: float
        learning_rate:
          high: 0.3
          log: true
          low: 0.005
          type: float
        max_depth:
          high: 12
          low: 3
          type: int
        min_child_weight:
          high: 10
          low: 1
          type: int
        n_estimators:
          high: 800
          low: 100
          type: int
        reg_alpha:
          high: 10.0
          log: true
          low: 1.0e-08
          type: float
        reg_lambda:
          high: 10.0
          log: true
          low: 1.0e-08
          type: float
        subsample:
          high: 1.0
          low: 0.5
          type: float
